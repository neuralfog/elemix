packages:
  - 'packages/*'
overrides:
  # CVE: esbuild >= 0.27.3, < 0.28.1 — force every (incl. transitive) copy to the patch.
  esbuild: 0.28.1
allowBuilds:
  '@biomejs/biome': true
  esbuild: true
# We publish the @neuralfog scope ourselves — exempt it from the release-age
# cooldown so the vite plugin can depend on our own just-published builds.
minimumReleaseAgeExclude:
  - '@neuralfog/*'
