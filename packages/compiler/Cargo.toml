[package]
name = "elemix-compiler"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
name = "elemix_compiler"
path = "src/lib.rs"

[[bin]]
name = "elemix-compiler"
path = "src/main.rs"

[dependencies]
clap = { version = "4.6.1", features = ["derive"] }
glob = "0.3.3"
oxc_allocator = "0.135.0"
oxc_ast = "0.135.0"
oxc_ast_visit = "0.135.0"
oxc_parser = "0.135.0"
oxc_span = "0.135.0"
