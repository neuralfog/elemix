name: release

# One `v*` tag releases the whole toolchain, gated end-to-end:
#
#   test → changelog → build-compiler (6 binaries) → publish-* → release-notes
#
# Nothing publishes unless everything before it is green. The `test` gate runs
# the full suite (which also `pnpm build`s every package + the wasm conformance),
# so the only build it can't cover is the cross-platform binaries — that's the
# one explicit build job, and EVERY publish needs it. Cross-package order
# (vite after compiler, storybook after elemix) comes from `needs:`, not npm
# polling — the deps were just published, so only a short CDN wait remains.
#
# Manual runs: workflow_dispatch with an explicit version.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true

defaults:
  run:
    shell: bash

jobs:
  # ── the released version, from the tag or the manual input ──────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      value: ${{ steps.v.outputs.value }}
    steps:
      - id: v
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

  # ── gate 1: the full test suite (reused from test.yml) ──────────────────────
  test:
    uses: ./.github/workflows/test.yml

  # ── gate 2: the root changelog's top entry == <version>, well-formed ────────
  changelog:
    needs: [test, version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Check changelog
        run: node scripts/changelog.mjs check "${{ needs.version.outputs.value }}"

  # ── mirror the Neovim plugin to its own repo ────────────────────────────────
  #    Plugin managers install a whole repo, not a monorepo subdir, so
  #    `git subtree split` mirrors packages/nvim to neuralfog/elemix.nvim (default
  #    branch + a v<version> tag). Needs an NVIM_MIRROR_TOKEN secret with push
  #    access to the mirror repo. No binary build, so it only rides the test gate.
  publish-nvim:
    needs: [changelog, version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # subtree split needs the full history
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Mirror packages/nvim to neuralfog/elemix.nvim
        env:
          NVIM_MIRROR_TOKEN: ${{ secrets.NVIM_MIRROR_TOKEN }}
        run: node scripts/publish-nvim.mjs "${{ needs.version.outputs.value }}"

  # ── the one build the test gate can't cover: the 6 cross-platform binaries.
  #    A failure on ANY target blocks every publish below. ──────────────────────
  build-compiler:
    needs: changelog
    name: build ${{ matrix.pkg }}
    runs-on: ${{ matrix.os }}
    env:
      # Cargo's curl downloader intermittently dies mid crates.io fetch on the
      # Windows runners with "[16] Error in the HTTP2 framing layer". Drop HTTP/2
      # multiplexing (→ HTTP/1.1) and give cargo more retries to ride out the flake.
      CARGO_HTTP_MULTIPLEXING: false
      CARGO_NET_RETRY: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: linux-x64
            target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            zig: true
          - pkg: linux-arm64
            target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            zig: true
          # Cross-compiled on Apple Silicon (the macOS SDK is universal) so we
          # don't depend on the deprecated, often-queued Intel macos-13 runner.
          - pkg: darwin-x64
            target: x86_64-apple-darwin
            os: macos-latest
          - pkg: darwin-arm64
            target: aarch64-apple-darwin
            os: macos-latest
          - pkg: win32-x64
            target: x86_64-pc-windows-msvc
            os: windows-latest
          - pkg: win32-arm64
            target: aarch64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/compiler
          key: ${{ matrix.target }}

      # Linux musl (x64 + arm64) cross-compiles cleanly from one runner via zig.
      - uses: mlugg/setup-zig@v2
        if: ${{ matrix.zig }}
      - name: Install cargo-zigbuild
        if: ${{ matrix.zig }}
        run: cargo install --locked cargo-zigbuild

      - name: Build (zig)
        if: ${{ matrix.zig }}
        working-directory: packages/compiler
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.zig }}
        working-directory: packages/compiler
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary into platform package
        working-directory: packages/compiler
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/elemix-compiler.exe" "npm/${{ matrix.pkg }}/elemix-compiler.exe"
          else
            cp "target/${{ matrix.target }}/release/elemix-compiler" "npm/${{ matrix.pkg }}/elemix-compiler"
            chmod +x "npm/${{ matrix.pkg }}/elemix-compiler"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: npm-${{ matrix.pkg }}
          path: packages/compiler/npm/${{ matrix.pkg }}
          if-no-files-found: error
          retention-days: 1

  # ── the analyzer's 6 cross-platform binaries (same matrix as the compiler).
  #    Native-only — it spawns node + the project's tsc, so there's no wasm here.
  #    It depends on the compiler crate as a library (path dep), built alongside. ─
  build-analyzer:
    needs: changelog
    name: build analyzer ${{ matrix.pkg }}
    runs-on: ${{ matrix.os }}
    env:
      CARGO_HTTP_MULTIPLEXING: false
      CARGO_NET_RETRY: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: linux-x64
            target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            zig: true
          - pkg: linux-arm64
            target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            zig: true
          - pkg: darwin-x64
            target: x86_64-apple-darwin
            os: macos-latest
          - pkg: darwin-arm64
            target: aarch64-apple-darwin
            os: macos-latest
          - pkg: win32-x64
            target: x86_64-pc-windows-msvc
            os: windows-latest
          - pkg: win32-arm64
            target: aarch64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/analyzer
          key: analyzer-${{ matrix.target }}

      - uses: mlugg/setup-zig@v2
        if: ${{ matrix.zig }}
      - name: Install cargo-zigbuild
        if: ${{ matrix.zig }}
        run: cargo install --locked cargo-zigbuild

      - name: Build (zig)
        if: ${{ matrix.zig }}
        working-directory: packages/analyzer
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.zig }}
        working-directory: packages/analyzer
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary into platform package
        working-directory: packages/analyzer
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/elemix-analyzer.exe" "npm/${{ matrix.pkg }}/elemix-analyzer.exe"
          else
            cp "target/${{ matrix.target }}/release/elemix-analyzer" "npm/${{ matrix.pkg }}/elemix-analyzer"
            chmod +x "npm/${{ matrix.pkg }}/elemix-analyzer"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: ea-npm-${{ matrix.pkg }}
          path: packages/analyzer/npm/${{ matrix.pkg }}
          if-no-files-found: error
          retention-days: 1

  # ── the formatter's 6 cross-platform binaries (same matrix).
  build-formatter:
    needs: changelog
    name: build formatter ${{ matrix.pkg }}
    runs-on: ${{ matrix.os }}
    env:
      CARGO_HTTP_MULTIPLEXING: false
      CARGO_NET_RETRY: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: linux-x64
            target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            zig: true
          - pkg: linux-arm64
            target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            zig: true
          - pkg: darwin-x64
            target: x86_64-apple-darwin
            os: macos-latest
          - pkg: darwin-arm64
            target: aarch64-apple-darwin
            os: macos-latest
          - pkg: win32-x64
            target: x86_64-pc-windows-msvc
            os: windows-latest
          - pkg: win32-arm64
            target: aarch64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/formatter
          key: formatter-${{ matrix.target }}

      - uses: mlugg/setup-zig@v2
        if: ${{ matrix.zig }}
      - name: Install cargo-zigbuild
        if: ${{ matrix.zig }}
        run: cargo install --locked cargo-zigbuild

      - name: Build (zig)
        if: ${{ matrix.zig }}
        working-directory: packages/formatter
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.zig }}
        working-directory: packages/formatter
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary into platform package
        working-directory: packages/formatter
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/elemix-template-formatter.exe" "npm/${{ matrix.pkg }}/elemix-template-formatter.exe"
          else
            cp "target/${{ matrix.target }}/release/elemix-template-formatter" "npm/${{ matrix.pkg }}/elemix-template-formatter"
            chmod +x "npm/${{ matrix.pkg }}/elemix-template-formatter"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: etf-npm-${{ matrix.pkg }}
          path: packages/formatter/npm/${{ matrix.pkg }}
          if-no-files-found: error
          retention-days: 1

  # ── publish: nothing here runs unless build-compiler (⇒ changelog ⇒ test) is
  #    fully green. That's the "publish only if everything built" guarantee. ────

  publish-compiler:
    name: publish compiler to npm
    needs: [build-compiler, version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      # Restore each platform package (now carrying its binary) over the scaffold.
      - uses: actions/download-artifact@v8
        with:
          pattern: npm-*
          path: artifacts

      - name: Place binaries
        run: |
          for dir in artifacts/npm-*; do
            pkg="${dir#artifacts/npm-}"
            cp -r "$dir/." "packages/compiler/npm/$pkg/"
          done
          # upload-artifact zips files and drops the Unix exec bit — restore it so
          # the published tarball ships an executable binary (npm preserves modes).
          chmod +x packages/compiler/npm/*/elemix-compiler 2>/dev/null || true

      - name: Stamp version
        run: node packages/compiler/npm/version.mjs "${{ needs.version.outputs.value }}"

      # Ship the changelog inside the launcher package (its `files` lists it).
      # Single source of truth is the root CHANGELOG.md, copied in at publish time.
      - name: Stage changelog into launcher
        run: cp CHANGELOG.md packages/compiler/npm/elemix-compiler/CHANGELOG.md

      # Platform packages first, then the launcher that depends on them.
      - name: Publish
        working-directory: packages/compiler/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.version.outputs.value }}"
          TAG=latest
          [[ "$VERSION" == *-* ]] && TAG=dev
          echo "publishing compiler $VERSION under dist-tag: $TAG"
          for pkg in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64 win32-arm64; do
            npm publish "./$pkg" --access public --provenance --tag "$TAG"
          done
          npm publish ./elemix-compiler --access public --provenance --tag "$TAG"

  publish-analyzer:
    name: publish analyzer to npm
    needs: [build-analyzer, version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      # Restore each platform package (now carrying its binary) over the scaffold.
      - uses: actions/download-artifact@v8
        with:
          pattern: ea-npm-*
          path: artifacts

      - name: Place binaries
        run: |
          for dir in artifacts/ea-npm-*; do
            pkg="${dir#artifacts/ea-npm-}"
            cp -r "$dir/." "packages/analyzer/npm/$pkg/"
          done
          # upload-artifact drops the Unix exec bit — restore it so the published
          # tarball ships an executable binary (npm preserves modes).
          chmod +x packages/analyzer/npm/*/elemix-analyzer 2>/dev/null || true

      - name: Stamp version
        run: node packages/analyzer/npm/version.mjs "${{ needs.version.outputs.value }}"

      # Ship the changelog inside the launcher (its `files` lists it), from the
      # single source of truth — the root CHANGELOG.md.
      - name: Stage changelog into launcher
        run: cp CHANGELOG.md packages/analyzer/npm/elemix-analyzer/CHANGELOG.md

      # Platform packages first, then the launcher that depends on them.
      - name: Publish
        working-directory: packages/analyzer/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.version.outputs.value }}"
          TAG=latest
          [[ "$VERSION" == *-* ]] && TAG=dev
          echo "publishing analyzer $VERSION under dist-tag: $TAG"
          for pkg in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64 win32-arm64; do
            npm publish "./$pkg" --access public --provenance --tag "$TAG"
          done
          npm publish ./elemix-analyzer --access public --provenance --tag "$TAG"

  publish-formatter:
    name: publish formatter to npm
    needs: [build-formatter, version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      # Restore each platform package (now carrying its binary) over the scaffold.
      - uses: actions/download-artifact@v8
        with:
          pattern: etf-npm-*
          path: artifacts

      - name: Place binaries
        run: |
          for dir in artifacts/etf-npm-*; do
            pkg="${dir#artifacts/etf-npm-}"
            cp -r "$dir/." "packages/formatter/npm/$pkg/"
          done
          # upload-artifact drops the Unix exec bit — restore it so the published
          # tarball ships an executable binary (npm preserves modes).
          chmod +x packages/formatter/npm/*/elemix-template-formatter 2>/dev/null || true

      - name: Stamp version
        run: node packages/formatter/npm/version.mjs "${{ needs.version.outputs.value }}"

      # Ship the changelog inside the launcher (its `files` lists it), from the
      # single source of truth — the root CHANGELOG.md.
      - name: Stage changelog into launcher
        run: cp CHANGELOG.md packages/formatter/npm/elemix-template-formatter/CHANGELOG.md

      # Platform packages first, then the launcher that depends on them.
      - name: Publish
        working-directory: packages/formatter/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.version.outputs.value }}"
          TAG=latest
          [[ "$VERSION" == *-* ]] && TAG=dev
          echo "publishing formatter $VERSION under dist-tag: $TAG"
          for pkg in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64 win32-arm64; do
            npm publish "./$pkg" --access public --provenance --tag "$TAG"
          done
          npm publish ./elemix-template-formatter --access public --provenance --tag "$TAG"

  publish-wasm:
    name: publish wasm to npm
    needs: [build-compiler, version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/compiler
          key: wasm

      - name: Install wasm-pack
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Build wasm package
        working-directory: packages/compiler
        run: wasm-pack build --target web --out-dir pkg --no-default-features --features wasm

      # Set the published name + stamp the version (like the binaries).
      - name: Finalize package
        working-directory: packages/compiler
        run: node scripts/wasm-pkg.mjs "${{ needs.version.outputs.value }}"

      # Hand the built wasm package to release-notes so it can be attached to the
      # GitHub Release alongside the native binaries (same as the npm-* artifacts).
      - uses: actions/upload-artifact@v7
        with:
          name: wasm-pkg
          path: packages/compiler/pkg
          if-no-files-found: error
          retention-days: 1

      - name: Publish
        working-directory: packages/compiler/pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.version.outputs.value }}"
          TAG=latest
          [[ "$VERSION" == *-* ]] && TAG=dev
          echo "publishing wasm $VERSION under dist-tag: $TAG"
          npm publish --access public --provenance --tag "$TAG"

  publish-elemix:
    name: publish @neuralfog/elemix
    needs: [build-compiler, version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Stamp version
        env:
          VERSION: ${{ needs.version.outputs.value }}
        run: |
          node -e '
            const fs = require("fs");
            const f = "packages/elemix/package.json";
            const p = JSON.parse(fs.readFileSync(f, "utf8"));
            p.version = process.env.VERSION;
            fs.writeFileSync(f, JSON.stringify(p, null, 4) + "\n");
            console.log(`elemix@${process.env.VERSION}`);
          '

      - name: Build
        run: pnpm --filter @neuralfog/elemix build

      # Ship the changelog (its `files` lists it) — staged from the root source.
      - name: Stage changelog
        run: cp CHANGELOG.md packages/elemix/CHANGELOG.md

      - name: Publish
        working-directory: packages/elemix
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.version.outputs.value }}"
          TAG=latest
          [[ "$VERSION" == *-* ]] && TAG=dev
          echo "publishing @neuralfog/elemix@$VERSION under dist-tag: $TAG"
          pnpm publish --access public --provenance --no-git-checks --tag "$TAG"

  publish-storybook:
    name: publish @neuralfog/elemix-storybook
    # After elemix is on npm (peer dependency).
    needs: [publish-elemix, version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      # Stamp BOTH manifests: storybook's own version, and elemix's — pnpm
      # rewrites storybook's `workspace:*` peer-dep to whatever elemix's version
      # field says at publish time, so it must read the released version.
      - name: Stamp version + elemix peer-dep
        env:
          VERSION: ${{ needs.version.outputs.value }}
        run: |
          node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            for (const f of ["packages/elemix/package.json", "packages/storybook/package.json"]) {
              const p = JSON.parse(fs.readFileSync(f, "utf8"));
              p.version = v;
              fs.writeFileSync(f, JSON.stringify(p, null, 4) + "\n");
            }
            console.log(`elemix-storybook@${v} (peer @neuralfog/elemix ${v})`);
          '

      # Storybook builds against elemix's types — build the library first.
      - name: Build
        run: |
          pnpm --filter @neuralfog/elemix build
          pnpm --filter @neuralfog/elemix-storybook build

      # `needs: publish-elemix` already ran the publish — this only rides out
      # npm's CDN propagation lag so an installer never sees a missing peer.
      - name: Wait for the elemix peer dependency
        run: |
          DEP="${{ needs.version.outputs.value }}"
          echo "waiting for @neuralfog/elemix@$DEP on npm..."
          for i in $(seq 1 30); do
            if npm view "@neuralfog/elemix@$DEP" version >/dev/null 2>&1; then
              echo "✓ @neuralfog/elemix@$DEP is published"
              exit 0
            fi
            echo "  not yet ($i/30)..."; sleep 5
          done
          echo "::error::@neuralfog/elemix@$DEP did not propagate in time"
          exit 1

      # Ship the changelog (its `files` lists it) — staged from the root source.
      - name: Stage changelog
        run: cp CHANGELOG.md packages/storybook/CHANGELOG.md

      - name: Publish
        working-directory: packages/storybook
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.version.outputs.value }}"
          TAG=latest
          [[ "$VERSION" == *-* ]] && TAG=dev
          echo "publishing @neuralfog/elemix-storybook@$VERSION under dist-tag: $TAG"
          pnpm publish --access public --provenance --no-git-checks --tag "$TAG"

  publish-testing-library:
    name: publish @neuralfog/elemix-testing-library
    # After elemix is on npm (peer dependency).
    needs: [publish-elemix, version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      # Stamp BOTH manifests: testing-library's own version, and elemix's — pnpm
      # rewrites the `workspace:*` peer-dep to whatever elemix's version field
      # says at publish time, so it must read the released version.
      - name: Stamp version + elemix peer-dep
        env:
          VERSION: ${{ needs.version.outputs.value }}
        run: |
          node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            for (const f of ["packages/elemix/package.json", "packages/testing-library/package.json"]) {
              const p = JSON.parse(fs.readFileSync(f, "utf8"));
              p.version = v;
              fs.writeFileSync(f, JSON.stringify(p, null, 4) + "\n");
            }
            console.log(`elemix-testing-library@${v} (peer @neuralfog/elemix ${v})`);
          '

      # testing-library builds against elemix's types — build the library first.
      - name: Build
        run: |
          pnpm --filter @neuralfog/elemix build
          pnpm --filter @neuralfog/elemix-testing-library build

      # `needs: publish-elemix` already ran the publish — this only rides out
      # npm's CDN propagation lag so an installer never sees a missing peer.
      - name: Wait for the elemix peer dependency
        run: |
          DEP="${{ needs.version.outputs.value }}"
          echo "waiting for @neuralfog/elemix@$DEP on npm..."
          for i in $(seq 1 30); do
            if npm view "@neuralfog/elemix@$DEP" version >/dev/null 2>&1; then
              echo "✓ @neuralfog/elemix@$DEP is published"
              exit 0
            fi
            echo "  not yet ($i/30)..."; sleep 5
          done
          echo "::error::@neuralfog/elemix@$DEP did not propagate in time"
          exit 1

      # Ship the changelog (its `files` lists it) — staged from the root source.
      - name: Stage changelog
        run: cp CHANGELOG.md packages/testing-library/CHANGELOG.md

      - name: Publish
        working-directory: packages/testing-library
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.version.outputs.value }}"
          TAG=latest
          [[ "$VERSION" == *-* ]] && TAG=dev
          echo "publishing @neuralfog/elemix-testing-library@$VERSION under dist-tag: $TAG"
          pnpm publish --access public --provenance --no-git-checks --tag "$TAG"

  publish-vite:
    name: publish @neuralfog/elemix-vite
    # After the compiler is on npm (runtime dependency, pinned to this version).
    needs: [publish-compiler, version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @neuralfog/elemix-vite build

      # Stamp the published version AND pin the native compiler dependency to it
      # (this release's compiler version), overriding whatever was committed.
      - name: Stamp version + compiler pin
        env:
          VERSION: ${{ needs.version.outputs.value }}
        run: |
          node -e '
            const fs = require("fs");
            const f = "packages/vite/package.json";
            const p = JSON.parse(fs.readFileSync(f, "utf8"));
            const v = process.env.VERSION;
            p.version = v;
            p.dependencies["@neuralfog/elemix-compiler"] = v;
            fs.writeFileSync(f, JSON.stringify(p, null, 4) + "\n");
            console.log(`elemix-vite@${v} (compiler dep ${v})`);
          '

      # `needs: publish-compiler` already ran the publish — ride out CDN lag.
      - name: Wait for the compiler dependency
        run: |
          DEP="${{ needs.version.outputs.value }}"
          echo "waiting for @neuralfog/elemix-compiler@$DEP on npm..."
          for i in $(seq 1 30); do
            if npm view "@neuralfog/elemix-compiler@$DEP" version >/dev/null 2>&1; then
              echo "✓ @neuralfog/elemix-compiler@$DEP is published"
              exit 0
            fi
            echo "  not yet ($i/30)..."; sleep 5
          done
          echo "::error::@neuralfog/elemix-compiler@$DEP did not propagate in time"
          exit 1

      # Ship the changelog (its `files` lists it) — staged from the root source.
      - name: Stage changelog
        run: cp CHANGELOG.md packages/vite/CHANGELOG.md

      - name: Publish
        working-directory: packages/vite
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.version.outputs.value }}"
          TAG=latest
          [[ "$VERSION" == *-* ]] && TAG=dev
          echo "publishing @neuralfog/elemix-vite@$VERSION under dist-tag: $TAG"
          npm publish --access public --provenance --tag "$TAG"

  # ── after everything is on npm: one GitHub Release from the changelog ───────
  release-notes:
    name: GitHub Release
    needs:
      - version
      - publish-compiler
      - publish-analyzer
      - publish-formatter
      - publish-wasm
      - publish-elemix
      - publish-storybook
      - publish-testing-library
      - publish-vite
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      # Every binary built this run, restored from the build/publish jobs:
      #   npm-<pkg> → compiler | ea-npm-<pkg> → analyzer | etf-npm-<pkg> → formatter | wasm-pkg → wasm.
      - uses: actions/download-artifact@v8
        with:
          pattern: npm-*
          path: artifacts
      - uses: actions/download-artifact@v8
        with:
          pattern: ea-npm-*
          path: artifacts-ea
      - uses: actions/download-artifact@v8
        with:
          pattern: etf-npm-*
          path: artifacts-etf
      - uses: actions/download-artifact@v8
        with:
          name: wasm-pkg
          path: wasm

      # Pack each platform into a downloadable archive so the GitHub Release ships
      # the prebuilt binaries, not just npm links. tar for unix (preserves the
      # exec bit), zip for the Windows .exe, and a SHA256SUMS for verification.
      - name: Package prebuilt binaries
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.value }}"
          mkdir -p dist-assets
          # tool = elemix-compiler | elemix-analyzer, from its artifact dir.
          pack() {
            local tool="$1" dir="$2" pkg="$3"
            if [ -f "$dir/$tool.exe" ]; then
              ( cd "$dir" && zip -qj "$GITHUB_WORKSPACE/dist-assets/$tool-$VERSION-$pkg.zip" "$tool.exe" )
            else
              # upload-artifact zips files and drops the Unix exec bit — restore it
              # so the tarball's binary is runnable straight out of the download.
              chmod +x "$dir/$tool"
              tar -czf "dist-assets/$tool-$VERSION-$pkg.tar.gz" -C "$dir" "$tool"
            fi
          }
          for dir in artifacts/npm-*; do pack elemix-compiler "$dir" "${dir#artifacts/npm-}"; done
          for dir in artifacts-ea/ea-npm-*; do pack elemix-analyzer "$dir" "${dir#artifacts-ea/ea-npm-}"; done
          for dir in artifacts-etf/etf-npm-*; do pack elemix-template-formatter "$dir" "${dir#artifacts-etf/etf-npm-}"; done
          tar -czf "dist-assets/elemix-compiler-$VERSION-wasm.tar.gz" -C wasm .
          ( cd dist-assets && sha256sum elemix-* > SHA256SUMS.txt )
          ls -l dist-assets

      - name: Assemble release notes
        run: node scripts/release-notes.mjs "${{ needs.version.outputs.value }}" > RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.version.outputs.value }}"
          TAG="${{ github.ref_name }}"
          [ -z "$TAG" ] && TAG="v$VERSION"
          PRERELEASE=()
          [[ "$VERSION" == *-* ]] && PRERELEASE=(--prerelease)
          # Idempotent: update notes if a release for this tag already exists.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file RELEASE_NOTES.md "${PRERELEASE[@]}"
          else
            gh release create "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.md "${PRERELEASE[@]}"
          fi
          # Attach (or replace) the prebuilt binaries on the release.
          gh release upload "$TAG" dist-assets/* --clobber
