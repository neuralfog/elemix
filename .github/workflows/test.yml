name: test

on:
  push:
    branches: [main, master]
  pull_request:
  # Callable as the first gate of the release pipeline (release.yml).
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # Rust toolchain — the compiler builds with cargo and `pnpm test` runs
      # `cargo test`; the wasm32 target + wasm-pack drive the wasm conformance gate;
      # clippy + rustfmt back `pnpm lint`.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Install wasm-pack
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/compiler
            packages/analyzer

      - run: pnpm install --frozen-lockfile

      - name: Lint changelog
        run: node scripts/changelog.mjs lint

      # Browsers for the compiler's Storybook conformance plays — every story runs
      # headless in Chromium, Firefox, and WebKit (Safari's engine).
      - name: Install Playwright browsers
        run: pnpm --filter @neuralfog/elemix-compiler exec playwright install --with-deps chromium firefox webkit

      - run: pnpm build

      - run: pnpm lint

      - run: pnpm test
