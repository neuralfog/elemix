name: test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # Rust toolchain — the compiler builds with cargo and `pnpm test` runs
      # `cargo test`; the wasm32 target + wasm-pack drive the wasm conformance gate;
      # clippy + rustfmt back `pnpm lint`.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Install wasm-pack
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/compiler

      - run: pnpm install --frozen-lockfile

      # Browser for the compiler's Storybook conformance plays (headless chromium).
      - name: Install Playwright chromium
        run: pnpm --filter @neuralfog/elemix-compiler exec playwright install --with-deps chromium

      - run: pnpm build

      - run: pnpm lint

      - run: pnpm test
