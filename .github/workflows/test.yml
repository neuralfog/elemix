name: test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # Rust toolchain — the compiler builds with cargo and `pnpm test` runs `cargo test`.
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/compiler

      - run: pnpm install --frozen-lockfile

      # Browser for the compiler's Storybook conformance plays (headless chromium).
      - name: Install Playwright chromium
        run: pnpm --filter @neuralfog/elemix-compiler exec playwright install --with-deps chromium

      - run: pnpm build

      - run: pnpm lint

      - run: pnpm test
