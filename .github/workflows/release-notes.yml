name: release-notes

# On a `v<version>` tag — the same tag that publishes every package — assemble the
# per-package changelog sections into a single GitHub Release. No artifacts are
# attached: the packages live on npm, and the release body links each one there.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release notes for (e.g. 0.1.0)'
        required: true

defaults:
  run:
    shell: bash

jobs:
  release-notes:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      # Gate: every package's top changelog entry must match the released version,
      # and the changelogs must be well-formed Keep a Changelog.
      - name: Lint changelogs
        run: node scripts/changelog.mjs check "${{ steps.version.outputs.value }}"

      - name: Assemble release notes
        run: node scripts/release-notes.mjs "${{ steps.version.outputs.value }}" > RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          TAG="${{ github.ref_name }}"
          [ -z "$TAG" ] && TAG="v$VERSION"
          PRERELEASE=()
          [[ "$VERSION" == *-* ]] && PRERELEASE=(--prerelease)
          # Idempotent: update notes if a release for this tag already exists.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file RELEASE_NOTES.md "${PRERELEASE[@]}"
          else
            gh release create "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.md "${PRERELEASE[@]}"
          fi
